# Alnitar — Cloudflare Worker (D1 + R2)
# Run: npx wrangler deploy (from cloudflare/ or repo root with --config cloudflare/wrangler.toml)
name = "alnitar-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
# Set via wrangler secret: npx wrangler secret put JWT_SECRET
# Set via wrangler secret: npx wrangler secret put CORS_ORIGIN (e.g. https://alnitar.vercel.app)

[[d1_databases]]
binding = "DB"
database_name = "alnitar-db"
database_id = "02627666-3a8a-4a39-837d-8c59ab7e3d5f"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "alnitar-uploads"

# Optional: for local dev
# [env.dev]
# [[env.dev.d1_databases]]
# binding = "DB"
# database_name = "alnitar-db"
# database_id = "..."
